<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Monthsary 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body {
    margin: 0;
    font-family: Georgia, serif;
    background: radial-gradient(circle at top, #1a1f2f, #0b0f1a);
    overflow-x: hidden;
    color: #fff;
}

/* CENTER CONTAINER */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 80px;
}

/* ENVELOPE */
.envelope {
    width: 220px;
    height: 150px;
    background: #ff4d88;
    border-radius: 15px;
    position: relative;
    cursor: pointer;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
    animation: float 3s ease-in-out infinite;
}

/* FLAPS */
.envelope::before {
    content: "";
    position: absolute;
    left: 0;
    border-left: 110px solid white;
    border-top: 75px solid transparent;
    border-bottom: 75px solid transparent;
}

.envelope::after {
    content: "";
    position: absolute;
    right: 0;
    border-right: 110px solid white;
    border-top: 75px solid transparent;
    border-bottom: 75px solid transparent;
}

/* FLOAT */
@keyframes float {
    0% { transform: translateY(0px);}
    50% { transform: translateY(-12px);}
    100% { transform: translateY(0px);}
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 10px 25px;
    border-radius: 12px;
    border: none;
    background: #1f2937;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4d88;
}

/* POLAROID */
.polaroid {
    margin-top: 40px;
    background: white;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0px 6px 18px rgba(0,0,0,0.4);
    transform: rotate(-3deg);
    animation: drop 0.8s ease;
}

.polaroid img {
    width: 260px;
    border-radius: 8px;
}

.caption {
    text-align: center;
    font-style: italic;
    color: #555;
    margin-top: 5px;
}

/* DROP ANIMATION */
@keyframes drop {
    from {opacity:0; transform: translateY(-80px) rotate(-3deg);}
    to {opacity:1; transform: translateY(0) rotate(-3deg);}
}

/* LETTER */
.letter {
    margin-top: 30px;
    background: #f5f1ea;
    padding: 25px;
    border-radius: 12px;
    width: 420px;
    box-shadow: 0px 10px 40px rgba(0,0,0,0.5);
    color: #333;
    line-height: 1.8;
    text-align: center;
    display: none;
}

/* TYPEWRITER CURSOR */
.cursor {
    display: inline-block;
    width: 6px;
    height: 18px;
    background: #333;
    margin-left: 4px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,100% {opacity:1;}
    50% {opacity:0;}
}

/* SPARKLES */
.sparkle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: rise linear infinite;
}

@keyframes rise {
    from { transform: translateY(100vh);}
    to { transform: translateY(-10vh);}
}

</style>
</head>

<body>

<div class="container">

    <div class="envelope"></div>

    <button onclick="openLetter()">Open Me</button>

    <div id="polaroid" class="polaroid" style="display:none;">
        <img src="photo.jpg">
        <div class="caption">Our favorite memory 💕</div>
    </div>

    <div id="letter" class="letter"></div>

</div>

<script>

/* TYPEWRITER TEXT */
const text = `Happy Monthsary, My Love 💖

Another month with you… and still, you feel like my favorite place.

Thank you for being my comfort on quiet days,
my happiness on ordinary ones,
and the person I always choose, again and again.

Every moment with you may seem simple,
but to me, they mean everything.

I love you, always and forever.

— Yours truly 💕`;

/* OPEN FUNCTION */
function openLetter() {
    document.getElementById("polaroid").style.display = "block";

    setTimeout(() => {
        let letterBox = document.getElementById("letter");
        letterBox.style.display = "block";

        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                letterBox.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 20);
            } else {
                letterBox.innerHTML += '<span class="cursor"></span>';
            }
        }
        typeWriter();

    }, 800);
}

/* SPARKLES */
for (let i = 0; i < 40; i++) {
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.animationDuration = (5 + Math.random()*5) + "s";
    document.body.appendChild(s);
}

</script>

</body>
</html>
